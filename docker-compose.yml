services:
  xo-grpc:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: xo-grpc

    ports:
      - "50051:50051"

    environment:
      PORT: 50051
      DATABASE_URL: postgres://xo_user:xo_password@postgres:5432/xo_grpc?sslmode=disable

    depends_on:
      - postgres

    restart: unless-stopped

  postgres:
    image: postgres:16-alpine

    container_name: xo-grpc-postgres

    ports:
      - "5432:5432"

    environment:
      POSTGRES_USER: xo_user
      POSTGRES_PASSWORD: xo_password
      POSTGRES_DB: xo_grpc

    volumes:
      - postgres_data:/var/lib/postgresql/data

    restart: unless-stopped

volumes:
  postgres_data: