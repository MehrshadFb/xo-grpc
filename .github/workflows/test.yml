name: test

# runs on push to main or pull request
on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    # runs on the latest Ubuntu LTS VM
    runs-on: ubuntu-latest

    # services to run in the background
    services:
      # PostgreSQL service - used for integration tests
      postgres:
        image: postgres:16-alpine
        # environment variables for the PostgreSQL service
        env:
          POSTGRES_USER: xo_user
          POSTGRES_PASSWORD: xo_password
          POSTGRES_DB: xo_grpc
        # ports to expose the PostgreSQL service
        ports:
          - 5432:5432
        # health check for the PostgreSQL service
        options: >-
          --health-cmd="pg_isready -U xo_user -d xo_grpc"
          --health-interval=5s # check every 5 seconds
          --health-timeout=5s # timeout after 5 seconds
          --health-retries=10 # retry 10 times
    
    # environment variables for the tests
    env:
      DATABASE_URL: postgres://xo_user:xo_password@postgres:5432/xo_grpc?sslmode=disable

    steps:
      # download the repo to the VM
      - name: Checkout repository
        uses: actions/checkout@v4

      # setup Go in the VM
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      # install protoc
      - name: Install protoc
        uses: arduino/setup-protoc@v3

      # install Go protobuf plugins
      - name: Install Go protobuf plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest

      # download the dependencies
      - name: Download dependencies
        run: go mod download

      # generate protobuf code
      - name: Generate protobuf code
        run: make proto

      # run migrations
      - name: Run migrations
        run: |
          curl -L https://github.com/golang-migrate/migrate/releases/download/v4.19.0/migrate.linux-amd64.tar.gz | tar xvz
          sudo mv migrate /usr/local/bin/migrate
          make migrate-up

      # run all tests with race detector (including e2e tests)
      - name: Run tests with race detector
        run: go test -race ./...

      # run PostgreSQL integration tests
      - name: Run PostgreSQL integration tests
        run: go test ./internal/store/postgres -v

      # build Docker image
      - name: Build Docker image
        run: docker build -t xo-grpc .